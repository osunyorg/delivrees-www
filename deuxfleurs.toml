[[cors]]
allowed_origins = "*"
allowed_methods = ["GET", "POST"]
allowed_headers = "*"

[[headers]]
for = ["**/*.woff2", "**/*.woff", "**/*.svg", "**/*.ttf", "**/*.otf", "**/*.eot", "**/*.js", "**/*.css"]
compress = "gzip"
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[headers]]
for = ["**/*.png", "**/*.jpg", "**/*.jpeg", "**/*.gif", "**/*.webp"]
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[redirects]]
from = "/agenda/2025/arcueil/index.html"
to = "/agenda/2025/salon-darcueil-2025/"

[[redirects]]
from = "/equipe/categories/organisatrice/index.html"
to = "/equipe/categories/organisatrice-organisateur/"

[[redirects]]
from = "/organisations/categories/lieux/index.html"
to = "/organisations/categories/lieux-daccueil/"

